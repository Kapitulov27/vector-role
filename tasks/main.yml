    name: Download Vector
    get_url:
      url: "https://packages.timber.io/vector/{{ vector_version }}/vector-{{ vector_version }}-x86_64-unknown-linux-gnu.tar.gz"
      dest: "/tmp/vector.tar.gz"

    name: Unarchive Vector
    unarchive:
      src: "/tmp/vector.tar.gz"
      dest: "/usr/local/bin"
      remote_src: yes
      extra_opt: "--strip-components=1"

    name: Create config directory
    file:
      path: "{{ vector_config_dir }}"
      state: directory
      mode: '0755'

    name: Template Vector config
    template:
      src: vector.toml.j2
      dest: "{{ vector_config_dir }}/vector.toml"
    notify: restart vector

    name: Create systemd service
    template:
      src: vector.service.j2
      dest: /etc/systemd/system/vector.service
    notify: restart vector
    templates/vector.toml.j2
    [sources.stdin]
    type = "stdin" 

[sinks.console]
type = "console"
inputs = ["stdin"]
templates/vector.service.j2
[Unit]
Description=Vector
After=network.target

[Service]
User=root
ExecStart=/usr/local/bin/vector --config /etc/vector/vector.toml
Restart=always

[Install]
WantedBy=multi-user.target# tasks file for vector-role
