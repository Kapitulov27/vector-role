---
dependency:
  name: galaxy
  enabled: false

driver:
  name: podman

platforms:
  - name: instance
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    command: "/lib/systemd/systemd"
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup

provisioner:
  name: ansible

scenario:
  name: molecule_podman_test
  test_sequence:
    - create
    - converge
    - verify
    - destroy
